root = "."
tmp_dir = "tmp"

[build]
  entrypoint = "./tmp/kalendar-api"
  cmd = "go build -buildvcs=false -o ./tmp/kalendar-api ./cmd/api"
  delay = 1000
  exclude_dir = ["tmp", "build", ".git"]
  exclude_regex = ["_test.go"]
  include_ext = ["go"]
  kill_delay = 0
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
